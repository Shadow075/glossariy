                            attrs: {

                    }
                }

        function HighlightText({ text, search }) {
            if (!search) return <span>{text}</span>;
            try {
                const cleanSearch = search.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`(${cleanSearch})`, 'gi');
                const parts = text.split(regex);
                return (
                    <span>
                        {parts.map((part, i) => 
                            regex.test(part) 
                                ? <span key={i} className="search-match">{part}</span>
                                : part
                        )}
                    </span>
                );
            } catch (e) {
                return <span>{text}</span>;
            }
        }

                                        (item.term && item.term.toLowerCase().includes(searchTerm.toLowerCase())) || 
                                        (item.shortDef && item.shortDef.toLowerCase().includes(searchTerm.toLowerCase()));
                    const matchCategory = selectedCategory === 'Все' || item.category === selectedCategory;
                    
                    const firstLetter = item.term ? item.term.trim().charAt(0).toUpperCase() : '';
                    const matchLetter = !selectedLetter || firstLetter === selectedLetter;
                    const matchFav = !onlyFavorites || favorites.includes(item.id);

                    return matchSearch && matchCategory && matchLetter && matchFav;
                }).sort((a, b) => (a.term || '').localeCompare(b.term || ''));
            }, [terms, searchTerm, selectedCategory, selectedLetter, onlyFavorites, favorites]);

            // Инициализация колоды карточек
            const handleStartCards = () => {
                const source = filteredTerms.length > 0 ? filteredTerms : terms;
                const shuffled = [...source].sort(() => Math.random() - 0.5);
                setShuffledDeck(shuffled);
                setCardIndex(0);
                setCardFlipped(false);
                showToast(`Загружена колода из ${shuffled.length} карточек`, 'info');
            };

            useEffect(() => {
                if (activeTab === 'study' && studySubTab === 'cards' && shuffledDeck.length === 0) {
                    handleStartCards();
                }
            }, [activeTab, studySubTab, shuffledDeck]);

            // Викторина: Запуск
            const handleStartQuiz = () => {
                const eligibleTerms = terms.filter(t => quizCategory === 'Все' || t.category === quizCategory);
                if (eligibleTerms.length < 4) {
                    showToast("Недостаточно терминов в этой категории (нужно минимум 4)", "error");
                    return;
                }

                const shuffledEligible = [...eligibleTerms].sort(() => Math.random() - 0.5);
                const count = Math.min(quizSize, shuffledEligible.length);
                const selected = shuffledEligible.slice(0, count);

                const questions = selected.map(correct => {
                    const otherOptions = terms.filter(t => t.id !== correct.id);
                    const shuffledOthers = [...otherOptions].sort(() => Math.random() - 0.5);
                    const distractors = shuffledOthers.slice(0, 3);
                    const options = [correct, ...distractors].sort(() => Math.random() - 0.5);

                    return {
                        correctTerm: correct,
                        questionText: correct.shortDef,
                        options: options
                    };
                });

                setQuizQuestions(questions);
                setQuizCurrentIndex(0);
                setQuizScore(0);
                setQuizSelectedOption(null);
                setQuizAnswerLocked(false);
                setQuizState('playing');
            };

            const handleSelectQuizOption = (idx) => {
                if (quizAnswerLocked) return;
                setQuizSelectedOption(idx);
                setQuizAnswerLocked(true);
                const q = quizQuestions[quizCurrentIndex];
                if (q.options[idx].id === q.correctTerm.id) {
                    setQuizScore(prev => prev + 1);
                }
            };

            const handleNextQuizQuestion = () => {
                if (quizCurrentIndex + 1 < quizQuestions.length) {
                    setQuizCurrentIndex(prev => prev + 1);
                    setQuizSelectedOption(null);
                    setQuizAnswerLocked(false);
                } else {
                    setQuizState('finished');
                }
            };

            // Добавление термина
            const handleAddTerm = (e) => {
                e.preventDefault();
                const relatedArray = newTerm.related.split(',').map(s => s.trim()).filter(s => s !== '');
                const newEntry = {
                    id: Date.now(),
                    term: newTerm.term.trim(),
                    category: newTerm.category.trim(),
                    shortDef: newTerm.shortDef.trim(),
                    longDef: newTerm.longDef.trim(),
                    example: newTerm.example.trim(),
                    related: relatedArray
                };
                setTerms([...terms, newEntry]);
                setIsAdding(false);
                setNewTerm({ term: '', category: 'Политология', shortDef: '', longDef: '', example: '', related: '' });
                setSearchTerm(newTerm.term);
                setSelectedCategory('Все');
                setSelectedLetter(null);
                setOnlyFavorites(false);
                showToast(`Термин "${newEntry.term}" успешно добавлен!`);
            };

            // Редактирование термина
            const handleOpenEdit = () => {
                setTermToEdit({
                    ...selectedTerm,
                    related: selectedTerm.related ? selectedTerm.related.join(', ') : ''
                });
                setIsEditing(true);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!termToEdit.term || !termToEdit.category || !termToEdit.shortDef || !termToEdit.longDef) {
                    showToast("Пожалуйста, заполните все обязательные поля", "error");
                    return;
                }
                const relatedArray = termToEdit.related.split(',').map(s => s.trim()).filter(s => s !== '');
                const updated = {
                    ...termToEdit,
                    term: termToEdit.term.trim(),
                    category: termToEdit.category.trim(),
                    shortDef: termToEdit.shortDef.trim(),
                    longDef: termToEdit.longDef.trim(),
                    example: termToEdit.example.trim(),
                    related: relatedArray
                };

                const updatedTerms = terms.map(t => t.id === updated.id ? updated : t);
                setTerms(updatedTerms);
                setSelectedTerm(updated);
                setIsEditing(false);
                showToast("Термин успешно обновлен");
            };

            // Удаление термина
            const handleConfirmDelete = () => {
                const updatedTerms = terms.filter(t => t.id !== selectedTerm.id);
                setTerms(updatedTerms);
                setFavorites(prev => prev.filter(id => id !== selectedTerm.id));
                setSelectedTerm(null);
                setIsDeleting(false);
                showToast("Термин удален");
            };

            // Избранное: Переключение
            const toggleFavorite = (e, id) => {
                e.stopPropagation();
                if (favorites.includes(id)) {
                    setFavorites(prev => prev.filter(item => item !== id));
                    showToast("Удалено из избранного", "info");
                } else {
                    setFavorites(prev => [...prev, id]);
                    showToast("Добавлено в избранное", "success");
                }
            };

            // Резервное копирование: Экспорт
            const handleExport = () => {
                try {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(terms, null, 2));
                    const dlAnchor = document.createElement('a');
                    dlAnchor.setAttribute("href", dataStr);
                    dlAnchor.setAttribute("download", `glossary_backup_${Date.now()}.json`);
                    document.body.appendChild(dlAnchor);
                    dlAnchor.click();
                    dlAnchor.remove();
                    showToast("База данных экспортирована!");
                } catch (e) {
                    showToast("Не удалось экспортировать файл", "error");
                }
            };

            // Резервное копирование: Импорт
            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        if (!Array.isArray(parsed)) {
                            showToast("Ошибка: в файле должен быть массив терминов", "error");
                            return;
                        }
                        const isValid = parsed.every(item => 
                            item && 
                            typeof item.term === 'string' && 
                            typeof item.category === 'string' &&
                            typeof item.shortDef === 'string' && 
                            typeof item.longDef === 'string'
                        );
                        if (!isValid) {
                            showToast("Файл содержит неверно структурированные элементы", "error");
                            return;
                        }

                        const cleanMerged = parsed.map((item, index) => ({
                            id: item.id || (Date.now() + index),
                            term: item.term.trim(),
                            category: item.category.trim(),
                            shortDef: item.shortDef.trim(),
                            longDef: item.longDef.trim(),
                            example: (item.example || '').trim(),
                            related: Array.isArray(item.related) ? item.related : []
                        }));

                        if (confirm("Объединить с существующими терминами? (Нажмите Отмена для полной замены текущей базы)")) {
                            const termNames = new Set(terms.map(t => t.term.toLowerCase()));
                            const duplicatesRemoved = cleanMerged.filter(m => !termNames.has(m.term.toLowerCase()));
                            setTerms([...terms, ...duplicatesRemoved]);
                            showToast(`Импорт завершен. Добавлено ${duplicatesRemoved.length} уникальных терминов.`);
                        } else {
                            setTerms(cleanMerged);
                            setFavorites([]);
                            showToast(`База данных заменена. Загружено ${cleanMerged.length} терминов.`);
                        }
                    } catch (err) {
                        showToast("Не удалось разобрать файл JSON", "error");
                    }
                };
                reader.readAsText(file);
            };

            // Сброс настроек
            const handleResetDatabase = () => {
                if (confirm("Вы действительно хотите сбросить базу данных к исходным 400 терминам? Все добавленные и отредактированные слова будут утеряны.")) {

                    setFavorites([]);

                }
            };

            return (

                                                Глоссарий

                                            <p className="text-xs text-slate-500 dark:text-slate-400 font-semibold">
                                                {terms.length} понятий • {favorites.length} в избранном

                                            title="Статистика и настройки"

                                            <Icon name="bar-chart-2" size={20} />

                                        >
                                            <Icon name="plus" size={16} strokeWidth={3} />
                                            <span>Создать слово</span>
                                        </button>

                                        <button 
                                            onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                            className="hidden md:inline-flex p-2.5 bg-slate-100 dark:bg-slate-800 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-all text-slate-600 dark:text-slate-300 border border-slate-200/50 dark:border-slate-800"
                                            title="Смена темы"
                                        >
                                            <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={20} className="transform rotate-0 hover:rotate-12 transition-transform" />
                                        </button>
                                        
                                        <button 
                                            onClick={() => setShowStats(!showStats)}
                                            className={`hidden md:inline-flex p-2.5 rounded-xl transition-all border ${showStats ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200/50 dark:border-slate-800 hover:bg-slate-200'}`}
                                            title="Статистика и настройки"
                                        >
                                            <Icon name="bar-chart-2" size={20} />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Stats & Operations sliding panel */}
                            {showStats && (
                                <div className="mt-4 pt-6 border-t border-slate-200 dark:border-slate-800 grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fadeIn">
                                    <div className="bg-slate-100/50 dark:bg-slate-900/50 p-5 rounded-2xl border border-slate-200/60 dark:border-slate-800">
                                        <h3 className="text-sm font-black text-slate-400 uppercase tracking-wider mb-3">Статистика базы</h3>
                                        <div className="grid grid-cols-2 gap-4 text-center">
                                            <div className="bg-white dark:bg-slate-800/80 p-3 rounded-xl border border-slate-200/40 dark:border-slate-700">
                                                <p className="text-2xl font-black text-indigo-600 dark:text-indigo-400">{terms.length}</p>
                                                <p className="text-xs text-slate-500 dark:text-slate-400 font-bold">Терминов всего</p>
                                            </div>
                                            <div className="bg-white dark:bg-slate-800/80 p-3 rounded-xl border border-slate-200/40 dark:border-slate-700">
                                                <p className="text-2xl font-black text-red-500">{favorites.length}</p>
                                                <p className="text-xs text-slate-500 dark:text-slate-400 font-bold">В избранном</p>
                                            </div>
                                        </div>
                                        <div className="mt-4 text-xs text-slate-500 dark:text-slate-400 font-semibold space-y-2">
                                            <p className="flex justify-between"><span>Оригинальные слова:</span> <span className="font-bold">400</span></p>
                                            <p className="flex justify-between"><span>Пользовательские слова:</span> <span className="font-bold">{Math.max(0, terms.length - 400)}</span></p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-100/50 dark:bg-slate-900/50 p-5 rounded-2xl border border-slate-200/60 dark:border-slate-800">
                                        <h3 className="text-sm font-black text-slate-400 uppercase tracking-wider mb-3">Топ категорий</h3>
                                        <div className="space-y-3 max-h-40 overflow-y-auto custom-scrollbar pr-2">
                                            {categories.filter(c => c !== 'Все').slice(0, 8).map(cat => {
                                                const count = categoryCounts[cat];
                                                const percent = Math.round((count / terms.length) * 100) || 0;
                                                return (
                                                    <div key={cat}>
                                                        <div className="flex justify-between text-xs font-bold mb-1">
                                                            <span className="truncate">{cat}</span>
                                                            <span className="text-slate-500">{count} ({percent}%)</span>

                                                            <div className="bg-indigo-500 h-full rounded-full" style={{ width: `${percent}%` }}></div>
                                                        </div>
                                                    </div>
                                                );

                                    </div>

                                    <div className="bg-slate-100/50 dark:bg-slate-900/50 p-5 rounded-2xl border border-slate-200/60 dark:border-slate-800 flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-sm font-black text-slate-400 uppercase tracking-wider mb-3 font-display">Резервное копирование</h3>
                                            <p className="text-xs text-slate-500 dark:text-slate-400 font-semibold mb-4 leading-relaxed">

                                            </p>

                                        <div className="grid grid-cols-2 gap-2">
                                            <button

                                                className="flex items-center justify-center gap-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 px-3.5 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-50 dark:hover:bg-slate-750 transition-all shadow-sm"

                    {/* Toast Notification */}

                    {/* Main Content */}

                        {/* ================= DICTIONARY TAB ================= */}

                                            <input

                                                placeholder="Поиск термина или определения..."

                                    <button 
                                        onClick={handleConfirmDelete}
                                        className="flex-1 bg-rose-600 hover:bg-rose-700 text-white py-3 rounded-xl text-xs font-black uppercase tracking-wider transition-all shadow-md shadow-rose-200 dark:shadow-none"
                                    >
                                        Удалить
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MegaInfiniteApp />);
    </script>
</body>
</html>
